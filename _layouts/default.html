<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.tagline }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <img class="site-photo" src="{{ '/assets/images/ajay.jpg' | relative_url }}" alt="Ajay Kannan">
      <div class="header-text">
        <h1 class="site-name">Ajay Kannan</h1>
        <p class="site-tagline">Software Engineering Leader</p>
        <div class="header-links">
          <a href="mailto:ajay@ajaykannan.ca">ajay@ajaykannan.ca</a>
          <span class="divider">·</span>
          <a href="https://www.linkedin.com/in/ajaykumarkannan/" target="_blank" rel="noopener">LinkedIn</a>
          <span class="divider">·</span>
          <span>Toronto, Canada</span>
        </div>
      </div>
    </div>
  </header>

  <main class="site-content">
    <div class="container">
      {{ content }}
    </div>
  </main>

</body>
</html>
